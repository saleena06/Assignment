<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Management System</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>Student Management System</h1>

    <!-- Form -->
    
    <div class="form-box">
    

      <input type="text" id="name" placeholder="Enter Name">

      <input type="text" id="roll" placeholder="Enter Roll Number">

      <input type="text" id="course" placeholder="Enter Course">

      <input type="number" id="marks" placeholder="Enter Marks">

      <button id="addBtn">Add Student</button>

    </div>

    <!-- Search -->
    <input type="text" id="search" placeholder="Search Student">


    <!-- Table -->
    <table>

      <thead>
        <tr>
          <th>Name</th>
          <th>Roll</th>
          <th>Course</th>
          <th>Marks</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody id="studentList">

      </tbody>

    </table>

  </div>

  <script src="script.js"></script>

</body>
</html>
