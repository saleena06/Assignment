<!DOCTYPE html>
<html >
<body>
    <h1>using while loop</h1>
    <p id="demo"></p>
    <script>
        let text = "";
        let i=0;
        while(i<=10){
            text +="the number is"+i+"<br>";
            i++;
        }
        document.getElementById("demo").innerHTML=text;
    </script>
</body>
</html>
